    "/api/v1/dashboard/employee-view": {
      "get": {
        "tags": [
          "Dashboard"
        ],
        "summary": "Employee View – all employees with their allocations (HR, PM).",
        "description": "Returns a paginated list of employees with their allocations and availability.\r\nSupports search, bench-only filter, and date window for availability computation.",
        "parameters": [
          {
            "name": "q",
            "in": "query",
            "description": "Search query (name, empCode, skill).",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "benchOnly",
            "in": "query",
            "description": "Return only employees with 0% allocation.",
            "schema": {
              "type": "boolean",
              "default": false
            }
          },
          {
            "name": "windowFrom",
            "in": "query",
            "description": "Start of availability window (default: today).",
            "schema": {
              "type": "string",
              "format": "date"
            }
          },
          {
            "name": "windowTo",
            "in": "query",
            "description": "End of availability window.",
            "schema": {
              "type": "string",
              "format": "date"
            }
          },
          {
            "name": "includeEnded",
            "in": "query",
            "description": "Include ended (past) allocations.",
            "schema": {
              "type": "boolean",
              "default": false
            }
          },
          {
            "name": "page",
            "in": "query",
            "description": "Page number (default: 1).",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 1
            }
          },
          {
            "name": "limit",
            "in": "query",
            "description": "Items per page (default: 10, max: 100).",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 10
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/EmployeeViewResponse"
