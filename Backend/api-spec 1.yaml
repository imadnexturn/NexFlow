{
  "openapi": "3.0.1",
  "info": {
    "title": "PAMS API",
    "description": "Project Allocation Management System.\n\nAll endpoints require a Keycloak-issued OIDC Bearer token.\nDates use ISO 8601 `YYYY-MM-DD` format. Timestamps use UTC.\n\n**Pagination:** List endpoints support `page` (default 1) and `limit` (default 10, max 100).\n**Code-based identifiers:** Path parameters use business codes (`accountCode`, `projectCode`, `empCode`).\n**Roles:** HR (full access), ProjectManager (scoped to own projects), Staff (own profile).",
    "version": "v1"
  },
  "paths": {
    "/api/v1/accounts": {
      "get": {
        "tags": [
          "Accounts"
        ],
        "summary": "List accounts with optional search and filters.",
        "description": "Returns a paginated list of accounts. Supports partial-match search on account code or name,\r\nand filtering by active status and account type. HR and PM roles only.",
        "parameters": [
          {
            "name": "search",
            "in": "query",
            "description": "Search by account code or name (partial match, case-insensitive).",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "isActive",
            "in": "query",
            "description": "Filter by active status. Omit to return all.",
            "schema": {
              "type": "boolean"
            }
          },
          {
            "name": "accountType",
            "in": "query",
            "description": "Filter by account type (Client, Internal, Bench).",
            "schema": {
              "$ref": "#/components/schemas/AccountType"
            }
          },
          {
            "name": "page",
            "in": "query",
            "description": "Page number (default: 1).",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 1
            }
          },
          {
            "name": "limit",
            "in": "query",
            "description": "Items per page (default: 10, max: 100).",
            "schema": {
              "type": "integer",
              "format": "int32",
              "default": 10
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AccountSummaryResponsePagedResponse"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ProblemDetails"
                }
              }
            }
          },
          "403": {
            "description": "Forbidden",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ProblemDetails"
                }
              }
            }
          }
        }
      },
      "post": {
        "tags": [
          "Accounts"
        ],
        "summary": "Create a new account (HR only).",
        "description": "Creates an account with the specified code, name, and type. Account code must be unique.",
        "requestBody": {
          "description": "Account creation request.",
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateAccountCommand"
              }
            },
            "text/json": {
              "schema": {
                "$ref": "#/components/schemas/CreateAccountCommand"
              }
            },
            "application/*+json": {
              "schema": {
                "$ref": "#/components/schemas/CreateAccountCommand"
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/AccountDetailResponse"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ProblemDetails"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ProblemDetails"
                }
              }
            }
          },
          "403": {
            "description": "Forbidden",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ProblemDetails"
                }
              }
            }
          },
          "409": {
            "description": "Conflict",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ProblemDetails"
                }
              }
            }
          }
        }
      }
    },
