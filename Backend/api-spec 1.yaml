    "/api/v1/allocations/capacity-check": {
      "get": {
        "tags": [
          "Allocations"
        ],
        "summary": "Check allocation capacity for an employee in a date window.",
        "description": "Returns how much allocation capacity (percentage) an employee has available\r\nin a given date window. Useful before creating or updating allocations.",
        "parameters": [
          {
            "name": "empCode",
            "in": "query",
            "description": "Employee code to check capacity for.",
            "schema": {
              "type": "string"
            }
          },
          {
            "name": "fromDate",
            "in": "query",
            "description": "Start of the date window.",
            "schema": {
              "type": "string",
              "format": "date"
            }
          },
          {
            "name": "toDate",
            "in": "query",
            "description": "End of the date window (optional, defaults to open-ended).",
            "schema": {
              "type": "string",
              "format": "date"
            }
          },
          {
            "name": "excludeAllocationId",
            "in": "query",
            "description": "Allocation ID to exclude from the calculation (for updates).",
            "schema": {
              "type": "string",
              "format": "uuid"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "application/json": {
                "schema": {
